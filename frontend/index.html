<!DOCTYPE html>
<html>
<head>
<title>Cricket AI Shot Analysis</title>
</head>

<body>

<h2>Upload Your Cricket Shot</h2>

<input type="file" id="videoFile">
<button onclick="uploadVideo()">Upload</button>

<h3 id="status"></h3>

<p id="similarity"></p>
<p id="feedback"></p>

<video id="resultVideo" controls width="600"></video>

<script>

async function uploadVideo(){

document.getElementById("status").innerText="Processing video..."

const fileInput=document.getElementById("videoFile")

const file=fileInput.files[0]

const formData=new FormData()

formData.append("file",file)

const response=await fetch("http://127.0.0.1:8000/upload",{
method:"POST",
body:formData
})

const data=await response.json()

document.getElementById("status").innerText="Processing completed"

document.getElementById("similarity").innerText="Similarity Score: "+data.similarity+"%"

document.getElementById("feedback").innerText="Feedback: "+data.feedback

document.getElementById("resultVideo").src=data.video_url

}

</script>

</body>
</html>
