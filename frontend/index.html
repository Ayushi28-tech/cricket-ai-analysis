    <script>
        async function uploadImage() {

            document.getElementById("status").innerText = "Processing image..."

            const fileInput = document.getElementById("imageFile")
            const file = fileInput.files[0]

            const formData = new FormData()
            formData.append("file", file)

            // show uploaded image
            document.getElementById("userImg").src = URL.createObjectURL(file)

            const response = await fetch("/upload-image", {
                method: "POST",
                body: formData
            })

            const data = await response.json()

            document.getElementById("status").innerText = "Done"

            document.getElementById("similarity").innerText =
                "Similarity Score : " + data.similarity + "%"

            document.getElementById("resultImg").src =
                "/output/result.jpg?" + new Date().getTime()
        }
    </script>
